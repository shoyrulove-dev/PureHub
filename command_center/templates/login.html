<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PureHub Command Center Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-lg items-center px-4 py-10">
      <section class="w-full rounded-[32px] border border-emerald-400/15 bg-[radial-gradient(circle_at_top,rgba(16,185,129,0.12),transparent_28%),linear-gradient(180deg,#0f172a_0%,#020617_100%)] p-8 shadow-[0_40px_120px_-60px_rgba(16,185,129,0.45)]">
        <p class="text-xs font-semibold uppercase tracking-[0.35em] text-emerald-300">PureHub Command Center</p>
        <h1 class="mt-3 text-3xl font-semibold tracking-tight text-white">Admin login</h1>
        <p class="mt-3 text-sm leading-7 text-slate-300">
          Sign in to manage Mongo-backed config, content automation, API catalog, and mini-app controls.
        </p>

        {% if message %}
        <div class="mt-5 rounded-2xl border border-rose-300/20 bg-rose-400/10 px-4 py-3 text-sm text-rose-100">
          {{ message }}
        </div>
        {% endif %}

        <form action="{{ admin_prefix }}/login" method="post" class="mt-6 space-y-4">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-200">Username</span>
            <input type="text" name="username" autocomplete="username" class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-emerald-300/40 focus:bg-white/7" />
          </label>

          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-200">Password</span>
            <input type="password" name="password" autocomplete="current-password" class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-emerald-300/40 focus:bg-white/7" />
          </label>

          <button type="submit" class="w-full rounded-2xl bg-emerald-400/15 px-4 py-3 text-sm font-semibold text-emerald-200 ring-1 ring-inset ring-emerald-400/20 transition hover:bg-emerald-400/20">
            Sign in
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
